<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享卡片生成</title>
    <style>
        body {
            margin: 0; padding: 40px;
            background: #E5E5E5;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .card {
            width: 600px; height: 316px;
            border-radius: 4px; overflow: hidden;
            position: relative; flex-shrink: 0;
            background: #FFFFFF;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .card__bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: 4px; background: #07C160;
        }
        .card__content {
            padding: 40px 44px; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
        }
        .card__label {
            font-size: 13px; color: #07C160; font-weight: 600;
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .card__title {
            font-size: 30px; font-weight: 700; color: #323233;
            line-height: 1.35; margin-bottom: 12px;
        }
        .card__title em { color: #07C160; font-style: normal; }
        .card__desc {
            font-size: 15px; color: #969799; line-height: 1.6;
        }
        .card__footer {
            position: absolute; bottom: 28px; left: 44px;
            font-size: 12px; color: #C8C9CC;
        }
        .card__dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: #07C160; margin-right: 6px;
            vertical-align: middle;
        }

        button {
            padding: 14px 36px; border: none; border-radius: 6px;
            background: #07C160; color: #fff; font-size: 16px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(7,193,96,0.3);
        }
        button:active { background: #06AD56; }
        .hint { color: #666; font-size: 13px; text-align: center; max-width: 600px; }
    </style>
</head>
<body>

    <div class="card" id="shareCard">
        <div class="card__bar"></div>
        <div class="card__content">
            <div class="card__label">大学生线上兼职</div>
            <div class="card__title">一个<em>零门槛</em>的<br>线上兼职项目</div>
            <div class="card__desc">校园跑 · 网课代刷 · 签到打卡 · 一部手机就能赚钱</div>
        </div>
        <div class="card__footer"><span class="card__dot"></span>K1ngMao · 免费加入代理</div>
    </div>

    <button id="downloadBtn">📥 一键下载分享卡片 (PNG)</button>
    <p class="hint">下载后保存到项目文件夹，替换原有的 share-card.jpg</p>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            const btn = this;
            btn.textContent = '⏳ 生成中...'; btn.disabled = true;
            try {
                const card = document.getElementById('shareCard');
                const dataUrl = await htmlToImage.toPng(card, { pixelRatio: 2 });
                const link = document.createElement('a');
                link.download = 'share-card.png'; link.href = dataUrl; link.click();
                btn.textContent = '✅ 下载完成！';
            } catch(e) {
                btn.textContent = '❌ 失败，改用截图 (Win+Shift+S)';
            }
            setTimeout(() => {
                btn.textContent = '📥 一键下载分享卡片 (PNG)';
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
