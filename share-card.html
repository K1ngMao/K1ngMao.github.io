<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享卡片生成</title>
    <style>
        body {
            margin: 0; padding: 40px;
            background: #1a1a2e;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .card {
            width: 600px; height: 316px;
            border-radius: 8px; overflow: hidden;
            position: relative; flex-shrink: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1040 40%, #0d1b3e 100%);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,229,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(179,136,255,0.1) 0%, transparent 70%);
        }
        .card__content {
            position: relative; z-index: 1;
            padding: 48px 52px; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
        }
        .card__badge {
            display: inline-block; padding: 4px 14px;
            border-radius: 12px; font-size: 12px; font-weight: 600;
            background: rgba(255,215,64,0.12); border: 1px solid rgba(255,215,64,0.3);
            color: #ffd740; letter-spacing: 2px; margin-bottom: 20px;
            width: fit-content;
        }
        .card__title {
            font-size: 31px; font-weight: 800; letter-spacing: -0.5px;
            color: #e8e8f0; line-height: 1.3; margin-bottom: 14px;
        }
        .card__title span {
            background: linear-gradient(135deg, #00e5ff, #b388ff, #e040fb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card__desc {
            font-size: 15px; color: #9090b0; line-height: 1.6;
            max-width: 420px; margin-bottom: 20px;
        }
        .card__footer {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: #6a6a88;
        }
        .card__dot { width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; }
        .card__accent {
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: linear-gradient(to bottom, #00e5ff, #b388ff, #e040fb);
        }

        .hint {
            color: #888; font-size: 14px; text-align: center;
            max-width: 600px; line-height: 1.8;
        }
        .hint strong { color: #00e5ff; }
    </style>
</head>
<body>

    <!-- 分享卡片 600×316 -->
    <div class="card" id="shareCard">
        <div class="card__accent"></div>
        <div class="card__content">
            <div class="card__badge">ONLINE PART-TIME</div>
            <div class="card__title">
                一个<span>零门槛</span>的<br>大学生线上兼职项目
            </div>
            <div class="card__desc">
                校园跑 · 网课代刷 · 签到打卡<br>一部手机就能接单赚钱 💰
            </div>
            <div class="card__footer">
                <div class="card__dot"></div> K1ngMao · 免费加入代理
            </div>
        </div>
    </div>

    <button id="downloadBtn" style="
        padding: 14px 36px; border: none; border-radius: 28px;
        background: linear-gradient(135deg, #b388ff, #e040fb);
        color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
        box-shadow: 0 4px 20px rgba(179,136,255,0.3);
    ">📥 一键下载分享卡片 (PNG)</button>

    <p class="hint">
        点击按钮下载 <strong>share-card.png</strong>，放到项目文件夹里即可<br>
        如果下载失败：Win+Shift+S 截图 → 保存为 <strong>share-card.png</strong>
    </p>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            const btn = this;
            btn.textContent = '⏳ 生成中...';
            btn.disabled = true;
            try {
                const card = document.getElementById('shareCard');
                const dataUrl = await htmlToImage.toPng(card, { pixelRatio: 2 });
                const link = document.createElement('a');
                link.download = 'share-card.png';
                link.href = dataUrl;
                link.click();
                btn.textContent = '✅ 下载完成！';
            } catch(e) {
                btn.textContent = '❌ 失败，请用截图方式 (Win+Shift+S)';
            }
            setTimeout(() => {
                btn.textContent = '📥 一键下载分享卡片 (PNG)';
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
